<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор стикеров Wildberries</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <span class="logo">WB</span>
    <h1>Генератор стикеров</h1>
  </header>

  <main class="layout">
    <section class="panel">
      <label class="field">
        <span>Номер ШК (печатается снизу)</span>
        <input type="text" id="code" inputmode="numeric" placeholder="Например 5525694823">
      </label>
      <p class="error" id="error"></p>
      <div class="actions">
        <button id="generate" class="btn btn-primary" type="button">Сгенерировать</button>
      </div>
      <div class="actions">
        <button id="download" class="btn" type="button" disabled>Скачать PNG</button>
        <button id="share" class="btn" type="button" disabled>Поделиться</button>
      </div>
      <p class="hint">Впишите номер ШК (только цифры) — код для QR вычислится автоматически по алгоритму WB.</p>
    </section>

    <section class="preview">
      <div class="sticker-card">
        <canvas id="sticker" width="600" height="740"></canvas>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span class="visits">Посещений: <strong id="visit-count">…</strong></span>
    <a class="wa-link" href="https://wa.me/79667283100?text=Здравствуйте!%20Есть%20предложение%20по%20сайту."
       target="_blank" rel="noopener" aria-label="Написать в WhatsApp">
      <svg class="wa-icon" viewBox="0 0 32 32" width="20" height="20" aria-hidden="true">
        <path fill="#25D366" d="M16 .5C7.4.5.5 7.4.5 16c0 2.8.8 5.5 2.2 7.9L.5 31.5l7.8-2.1c2.3 1.3 4.9 1.9 7.7 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.5 16 .5z"/>
        <path fill="#fff" d="M24.1 19.6c-.4-.2-2.4-1.2-2.8-1.3-.4-.1-.7-.2-1 .2-.3.4-1.1 1.3-1.3 1.6-.2.2-.5.3-.9.1-2.3-1.1-3.8-2-5.3-4.6-.4-.7.4-.6 1.1-2 .1-.2.1-.5 0-.7-.1-.2-1-2.4-1.4-3.3-.4-.9-.7-.7-1-.8h-.8c-.3 0-.7.1-1.1.5-.4.4-1.4 1.4-1.4 3.4s1.5 4 1.7 4.2c.2.3 2.9 4.5 7.1 6.3 2.6 1.1 3.6 1.2 4.9 1 .8-.1 2.4-1 2.8-2 .3-1 .3-1.8.2-2-.1-.2-.4-.3-.8-.5z"/>
      </svg>
      <span>Предложить идею</span>
    </a>
  </footer>

  <script src="js/qrcode.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/visits.js"></script>
</body>
</html>
